<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Архив Дьётонрея — персональная вики</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Linux Libertine','Georgia','Times',serif;
      background: #f6f6f6;
      color: #202122;
      display: flex;
      min-height: 100vh;
    }
    /* Боковая панель в стиле Википедии */
    .sidebar {
      width: 260px;
      background: #f8f9fa;
      border-right: 1px solid #a2a9b1;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      font-size: 0.9rem;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar .wiki-logo {
      text-align: center;
      margin-bottom: 10px;
    }
    .sidebar .wiki-logo img {
      width: 120px;
      height: auto;
    }
    .sidebar h2 {
      font-family: 'Linux Libertine','Georgia',serif;
      font-size: 1.3rem;
      border-bottom: 1px solid #a2a9b1;
      padding-bottom: 5px;
      margin-bottom: 5px;
      color: #000;
    }
    .sidebar .nav-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #54595d;
      letter-spacing: 0.5px;
      margin: 10px 0 5px;
    }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      margin: 2px;
      border-radius: 3px;
      background: #eaecf0;
      color: #202122;
      font-size: 0.8rem;
      border: 1px solid #c8ccd1;
      cursor: pointer;
      transition: 0.1s;
    }
    .badge.active {
      background: #eaf3ff;
      border-color: #447ff5;
      color: #0645ad;
      font-weight: bold;
    }
    .badge.epoch-badge {
      border-left: 5px solid var(--epoch-color, #888);
    }
    .search-box {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #a2a9b1;
      border-radius: 2px;
      font-size: 0.9rem;
      outline: none;
    }
    .search-box:focus { border-color: #447ff5; box-shadow: 0 0 0 1px #447ff5; }
    .btn {
      background: #f8f9fa;
      border: 1px solid #a2a9b1;
      border-radius: 2px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #202122;
      transition: 0.1s;
      text-align: center;
      width: 100%;
      margin: 3px 0;
    }
    .btn:hover { background: #eaecf0; }
    .btn-primary {
      background: #447ff5;
      border-color: #447ff5;
      color: white;
      font-weight: bold;
    }
    .btn-primary:hover { background: #2a4b8d; }
    .btn-small { width: auto; padding: 4px 10px; font-size: 0.8rem; }
    .main {
      flex: 1;
      padding: 20px 30px;
      overflow-y: auto;
      background: #ffffff;
    }
    .main-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #a2a9b1;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .main-header h1 {
      font-family: 'Linux Libertine','Georgia',serif;
      font-size: 2rem;
      font-weight: normal;
      color: #000;
    }
    .event-count { color: #54595d; font-size: 0.9rem; }
    .event-card {
      background: #fff;
      border: 1px solid #c8ccd1;
      border-left: 6px solid #447ff5;
      border-radius: 2px;
      padding: 15px 20px;
      margin-bottom: 15px;
      transition: 0.1s;
      position: relative;
    }
    .event-card:hover { border-color: #a2a9b1; }
    .event-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .event-date {
      font-weight: bold;
      font-size: 1.1rem;
      color: #0645ad;
      white-space: nowrap;
    }
    .event-epoch {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--epoch-bg, #eaecf0);
      color: #fff;
      font-weight: bold;
    }
    .event-title {
      font-size: 1.3rem;
      font-weight: 500;
      color: #000;
      flex: 1;
    }
    .event-category {
      font-size: 0.7rem;
      text-transform: uppercase;
      background: #eaecf0;
      padding: 2px 8px;
      border-radius: 10px;
      color: #54595d;
      border: 1px solid #c8ccd1;
    }
    .event-desc {
      color: #202122;
      line-height: 1.6;
      margin-top: 5px;
    }
    .event-actions {
      position: absolute;
      top: 10px;
      right: 15px;
      display: flex;
      gap: 5px;
      opacity: 0;
      transition: 0.1s;
    }
    .event-card:hover .event-actions { opacity: 1; }
    .action-btn {
      background: none;
      border: none;
      color: #54595d;
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 2px;
    }
    .action-btn:hover { background: #eaecf0; color: #000; }
    .action-btn.delete:hover { color: #d33; }
    .empty-state {
      text-align: center;
      color: #54595d;
      margin-top: 50px;
      font-size: 1.1rem;
    }
    /* Модальное окно */
    .modal-overlay {
      display: none;
      position: fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal {
      background: white;
      border: 1px solid #a2a9b1;
      border-radius: 2px;
      padding: 25px;
      width: 90%;
      max-width: 650px;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    .modal h2 {
      font-family: 'Linux Libertine',serif;
      font-size: 1.6rem;
      border-bottom: 1px solid #a2a9b1;
      padding-bottom: 5px;
    }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    .form-group label { font-size: 0.8rem; color: #54595d; }
    input, select, textarea {
      border: 1px solid #a2a9b1;
      border-radius: 2px;
      padding: 7px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
    }
    textarea { min-height: 80px; }
    input:focus, select:focus, textarea:focus { border-color: #447ff5; box-shadow: 0 0 0 1px #447ff5; }
    .flex-buttons { display: flex; gap: 10px; justify-content: flex-end; }
    .epoch-manager { display: flex; gap: 5px; margin-top: 5px; }
    .epoch-manager input { flex: 1; }
    .color-picker { width: 40px; height: 30px; padding: 2px; border: 1px solid #a2a9b1; }
  </style>
</head>
<body>

<!-- Боковая панель -->
<div class="sidebar">
  <div class="wiki-logo">
    <div style="font-size:1.8rem; color:#0645ad; font-family:'Linux Libertine',serif;">🌍 Дьётонрей</div>
    <div style="font-size:0.8rem; color:#54595d;">персональная хроника</div>
  </div>
  <div>
    <input type="text" class="search-box" id="searchInput" placeholder="Поиск по архиву...">
  </div>
  <div class="nav-section">
    <h3>📅 Эпохи</h3>
    <div id="epochFilters" style="display:flex; flex-wrap:wrap; gap:4px;"></div>
    <div class="epoch-manager">
      <input type="text" id="newEpochName" placeholder="Новая эпоха">
      <input type="color" id="newEpochColor" class="color-picker" value="#447ff5">
      <button class="btn btn-small" id="addEpochBtn">+</button>
    </div>
  </div>
  <div class="nav-section">
    <h3>🏷️ Категории</h3>
    <div id="categoryFilters" style="display:flex; flex-wrap:wrap; gap:4px;"></div>
    <div style="display:flex; gap:5px; margin-top:5px;">
      <input type="text" id="newCategoryName" placeholder="Новая категория">
      <button class="btn btn-small" id="addCategoryBtn">+</button>
    </div>
  </div>
  <button class="btn btn-primary" id="addEventBtn">➕ Добавить событие</button>
  <button class="btn" id="exportBtn">📤 Экспорт (JSON)</button>
  <button class="btn" id="importBtn">📥 Импорт</button>
  <input type="file" id="importFile" accept=".json" style="display:none">
  <div style="font-size:0.7rem; color:#54595d; margin-top:10px;">
    Данные хранятся локально. Регулярно делайте экспорт.
  </div>
</div>

<!-- Основная область -->
<div class="main">
  <div class="main-header">
    <h1>Хронология Дьётонрея</h1>
    <span class="event-count" id="eventCount"></span>
  </div>
  <div id="timelineContainer"></div>
</div>

<!-- Модальное окно -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Новое событие</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Дата / год</label>
        <input type="text" id="eventDate" placeholder="например, 6.87 млрд д.л.">
      </div>
      <div class="form-group">
        <label>Порядок сортировки</label>
        <input type="number" id="eventOrder" placeholder="Число" value="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Эпоха</label>
        <select id="eventEpoch"></select>
      </div>
      <div class="form-group">
        <label>Категория</label>
        <select id="eventCategory"></select>
      </div>
    </div>
    <div class="form-group">
      <label>Название события</label>
      <input type="text" id="eventTitle" placeholder="Краткое название">
    </div>
    <div class="form-group">
      <label>Описание</label>
      <textarea id="eventDesc" placeholder="Подробности..."></textarea>
    </div>
    <div class="flex-buttons">
      <button class="btn" id="cancelModalBtn">Отмена</button>
      <button class="btn btn-primary" id="saveEventBtn">Сохранить</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const STORAGE_KEY = 'dyotonrei_archive';

    // Стартовые данные мира Дьётонрей (будут загружены при первом запуске)
    const defaultEpochs = [
      'Эон I: Рождение Огненного Шара',
      'Эон II: Континенты и Ванадиевая Жизнь',
      'Эон III: Звук и Кость',
      'Эон IV: Кхаары и Звёздные Сады'
    ];
    const defaultEpochColors = ['#d35400', '#2980b9', '#8e44ad', '#27ae60'];
    const defaultCategories = [
      'Космогония', 'Геология', 'Биология', 'Катаклизм',
      'Эволюция', 'Культура', 'Война', 'Технология', 'Современность'
    ];
    const defaultEvents = [
      { id: 1, dateString: '6.87 млрд д.л.', order: 1, epoch: defaultEpochs[0], category: 'Космогония',
        title: 'Рождение системы Кхарона',
        desc: 'Оранжевый карлик Кхарон (K4V) собрал протопланетный диск. Началось формирование Дьётонрея — второй планеты системы.' },
      { id: 2, dateString: '6.27 млрд д.л.', order: 2, epoch: defaultEpochs[0], category: 'Геология',
        title: 'Эпоха Плазменных Вихрей',
        desc: 'Солнечные бури молодого Кхарона породили гигантские плазменные торнадо, выжигавшие стекловидные каньоны и обогащавшие кору тяжёлыми металлами.' },
      { id: 3, dateString: '5.52 млрд д.л.', order: 3, epoch: defaultEpochs[0], category: 'Космогония',
        title: 'Обретение лун Ара и Тисиф',
        desc: 'Дьётонрей захватил два спутника, стабилизировавших вращение планеты. Луны стали «небесными демпферами» климата.' },
      { id: 4, dateString: '4.93 млрд д.л.', order: 4, epoch: defaultEpochs[0], category: 'Геология',
        title: 'Рождение Ванадиевого Моря',
        desc: 'Первые постоянные водоёмы: мелководный океан из кометной и вулканической воды. Берега из базальта и кварцевого стекла.' },
      { id: 5, dateString: '4.03 млрд д.л.', order: 5, epoch: defaultEpochs[1], category: 'Биология',
        title: 'Кислородная революция',
        desc: 'Цианобактерии с ванадохлорофиллом насытили океан кислородом, вызвав окрашивание вод в ржавый цвет и вымирание анаэробов.' },
      { id: 6, dateString: '3.37 млрд д.л.', order: 6, epoch: defaultEpochs[1], category: 'Геология',
        title: 'Формирование суперконтинента Ильтара',
        desc: 'Столкновение Ульгура и Ванаара создало гигантский массив суши с горами, рифтовыми ртутными морями и Серебряной революцией флоры.' },
      { id: 7, dateString: '2.41 млрд д.л.', order: 7, epoch: defaultEpochs[2], category: 'Эволюция',
        title: 'Начало Эона Звука',
        desc: 'Кристальные хоры губок и Шептуны-растения открыли эру акустической эволюции. Первые звуковые войны между видами.' },
      { id: 8, dateString: '1.74 млрд д.л.', order: 8, epoch: defaultEpochs[2], category: 'Эволюция',
        title: 'Появление ванадазавров',
        desc: 'Рептилии с ванадиевой кровью и бронёй из карбида кремния стали доминирующими гигантами суши (до 15 м).' },
      { id: 9, dateString: '0.67 млрд д.л.', order: 9, epoch: defaultEpochs[2], category: 'Катаклизм',
        title: 'Великое Угасание',
        desc: 'Падение уровня O₂, кислотные дожди и огненные штормы уничтожили 95% видов, завершив эру исполинов.' },
      { id: 10, dateString: '0.57 млрд д.л.', order: 10, epoch: defaultEpochs[3], category: 'Культура',
        title: 'Пещерные царства барсов',
        desc: 'Северяне-барсы освоили Вечные костры и выплавку металла, южане-леопарды — земледелие и биофильтрацию.' },
      { id: 11, dateString: '0.22 млрд д.л.', order: 11, epoch: defaultEpochs[3], category: 'Война',
        title: 'Война у Слезы Ары',
        desc: 'Первый контакт и конфликт барсов и леопардов за ресурсы. Создана нейтральная зона Ильтара-2.' },
      { id: 12, dateString: '3179 г. (современность)', order: 12, epoch: defaultEpochs[3], category: 'Современность',
        title: 'Космический Рассвет',
        desc: 'Терраформинг астероидов, орбитальные зеркала, совместный ИИ «Ара-Тис». Праздник Танца Двух Лун объединяет народы.' }
    ];

    let events = [];
    let epochs = [];
    let epochColors = [];
    let categories = [];

    let activeEpoch = null;
    let activeCategory = null;
    let searchQuery = '';
    let editingId = null;

    // Загрузка данных
    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const data = JSON.parse(raw);
          events = data.events || [];
          epochs = data.epochs || [];
          epochColors = data.epochColors || [];
          categories = data.categories || [];
        } catch(e) {}
      }
      // Если данных нет — загружаем демо-версию мира Дьётонрей
      if (!raw || events.length === 0) {
        events = JSON.parse(JSON.stringify(defaultEvents));
        epochs = [...defaultEpochs];
        epochColors = [...defaultEpochColors];
        categories = [...defaultCategories];
        saveData();
      }
      // Убедимся, что у всех событий есть id
      events.forEach((e,idx) => { if (!e.id) e.id = Date.now() + idx; });
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ events, epochs, epochColors, categories }));
    }

    // Рендер фильтров
    function renderFilters() {
      const epochContainer = document.getElementById('epochFilters');
      epochContainer.innerHTML = '';
      epochs.forEach((name, i) => {
        const badge = document.createElement('span');
        badge.className = `badge epoch-badge ${activeEpoch === name ? 'active' : ''}`;
        badge.style.setProperty('--epoch-color', epochColors[i] || '#888');
        badge.style.borderLeftColor = epochColors[i] || '#888';
        badge.textContent = name;
        badge.onclick = () => {
          activeEpoch = activeEpoch === name ? null : name;
          renderFilters();
          renderTimeline();
        };
        epochContainer.appendChild(badge);
      });

      const catContainer = document.getElementById('categoryFilters');
      catContainer.innerHTML = '';
      categories.forEach(cat => {
        const badge = document.createElement('span');
        badge.className = `badge ${activeCategory === cat ? 'active' : ''}`;
        badge.textContent = cat;
        badge.onclick = () => {
          activeCategory = activeCategory === cat ? null : cat;
          renderFilters();
          renderTimeline();
        };
        catContainer.appendChild(badge);
      });
    }

    function updateModalSelects() {
      const epochSel = document.getElementById('eventEpoch');
      const catSel = document.getElementById('eventCategory');
      if (epochSel) epochSel.innerHTML = epochs.map(e => `<option value="${e}">${e}</option>`).join('');
      if (catSel) catSel.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function getFilteredEvents() {
      return events.filter(ev => {
        if (activeEpoch && ev.epoch !== activeEpoch) return false;
        if (activeCategory && ev.category !== activeCategory) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return (ev.dateString.toLowerCase().includes(q) ||
                  ev.title.toLowerCase().includes(q) ||
                  ev.desc.toLowerCase().includes(q) ||
                  ev.epoch.toLowerCase().includes(q) ||
                  ev.category.toLowerCase().includes(q));
        }
        return true;
      }).sort((a, b) => a.order - b.order);
    }

    function renderTimeline() {
      const container = document.getElementById('timelineContainer');
      const filtered = getFilteredEvents();
      document.getElementById('eventCount').textContent = `Показано: ${filtered.length} из ${events.length}`;

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">🔍 Нет событий, соответствующих фильтрам. Добавьте новое событие или измените критерии.</div>`;
        return;
      }

      container.innerHTML = filtered.map(ev => {
        const epochIdx = epochs.indexOf(ev.epoch);
        const color = epochColors[epochIdx] || '#888';
        return `
          <div class="event-card" style="border-left-color: ${color}">
            <div class="event-header">
              <span class="event-date">${escapeHtml(ev.dateString)}</span>
              <span class="event-epoch" style="background:${color}">${escapeHtml(ev.epoch)}</span>
              <span class="event-title">${escapeHtml(ev.title)}</span>
              <span class="event-category">${escapeHtml(ev.category)}</span>
            </div>
            <div class="event-desc">${escapeHtml(ev.desc).replace(/\n/g, '<br>')}</div>
            <div class="event-actions">
              <button class="action-btn edit" data-id="${ev.id}">✏️</button>
              <button class="action-btn delete" data-id="${ev.id}">🗑️</button>
            </div>
          </div>
        `;
      }).join('');

      container.querySelectorAll('.edit').forEach(btn => {
        btn.addEventListener('click', () => openEditor(Number(btn.dataset.id)));
      });
      container.querySelectorAll('.delete').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('Удалить это событие?')) {
            events = events.filter(e => e.id !== Number(btn.dataset.id));
            saveData();
            renderTimeline();
          }
        });
      });
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    // Модальное окно
    const modal = document.getElementById('modalOverlay');
    function openEditor(id = null) {
      editingId = id;
      updateModalSelects();
      if (id) {
        const ev = events.find(e => e.id === id);
        if (!ev) return;
        document.getElementById('modalTitle').textContent = 'Редактировать событие';
        document.getElementById('eventDate').value = ev.dateString;
        document.getElementById('eventOrder').value = ev.order;
        document.getElementById('eventEpoch').value = ev.epoch;
        document.getElementById('eventCategory').value = ev.category;
        document.getElementById('eventTitle').value = ev.title;
        document.getElementById('eventDesc').value = ev.desc;
      } else {
        document.getElementById('modalTitle').textContent = 'Новое событие';
        document.getElementById('eventDate').value = '';
        document.getElementById('eventOrder').value = events.length ? Math.max(...events.map(e=>e.order),0)+1 : 0;
        document.getElementById('eventEpoch').value = epochs[0] || '';
        document.getElementById('eventCategory').value = categories[0] || '';
        document.getElementById('eventTitle').value = '';
        document.getElementById('eventDesc').value = '';
      }
      modal.style.display = 'flex';
    }

    function closeModal() {
      modal.style.display = 'none';
      editingId = null;
    }

    document.getElementById('saveEventBtn').addEventListener('click', () => {
      const date = document.getElementById('eventDate').value.trim();
      const order = parseInt(document.getElementById('eventOrder').value) || 0;
      const epoch = document.getElementById('eventEpoch').value;
      const cat = document.getElementById('eventCategory').value;
      const title = document.getElementById('eventTitle').value.trim();
      const desc = document.getElementById('eventDesc').value.trim();
      if (!date || !title) { alert('Дата и название обязательны'); return; }
      if (editingId) {
        const ev = events.find(e => e.id === editingId);
        if (ev) { ev.dateString = date; ev.order = order; ev.epoch = epoch; ev.category = cat; ev.title = title; ev.desc = desc; }
      } else {
        events.push({ id: Date.now(), dateString: date, order, epoch, category: cat, title, desc });
      }
      saveData();
      closeModal();
      renderTimeline();
      renderFilters();
    });

    document.getElementById('addEventBtn').addEventListener('click', () => openEditor(null));
    document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
    window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // Поиск
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value;
      renderTimeline();
    });

    // Добавление эпохи/категории
    document.getElementById('addEpochBtn').addEventListener('click', () => {
      const name = document.getElementById('newEpochName').value.trim();
      if (!name) return;
      if (epochs.includes(name)) { alert('Такая эпоха уже есть'); return; }
      epochs.push(name);
      epochColors.push(document.getElementById('newEpochColor').value);
      saveData();
      document.getElementById('newEpochName').value = '';
      renderFilters();
      updateModalSelects();
    });
    document.getElementById('addCategoryBtn').addEventListener('click', () => {
      const name = document.getElementById('newCategoryName').value.trim();
      if (!name) return;
      if (categories.includes(name)) { alert('Такая категория уже есть'); return; }
      categories.push(name);
      saveData();
      document.getElementById('newCategoryName').value = '';
      renderFilters();
      updateModalSelects();
    });

    // Экспорт/импорт
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify({ events, epochs, epochColors, categories }, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `dyotonrei_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.events && data.epochs && data.categories) {
            if (confirm('Импорт заменит все текущие данные. Продолжить?')) {
              events = data.events;
              epochs = data.epochs;
              epochColors = data.epochColors || [];
              categories = data.categories;
              events.forEach((ev,i) => { if (!ev.id) ev.id = Date.now()+i; });
              saveData();
              renderFilters();
              renderTimeline();
              updateModalSelects();
            }
          } else alert('Неверный формат файла.');
        } catch(ex) { alert('Ошибка чтения JSON.'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    document.addEventListener('keydown', e => { if (e.key==='Escape' && modal.style.display==='flex') closeModal(); });

    // Старт
    loadData();
    renderFilters();
    updateModalSelects();
    renderTimeline();
  })();
</script>
</body>
</html>

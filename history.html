<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вики Дьётонрея — Архив</title>
<style>
  :root {
    --bg: #0a0a14;
    --surface: #14142b;
    --surface2: #1e1e3a;
    --text: #d0d0e0;
    --text-secondary: #9090b0;
    --accent: #7b5ea7;
    --accent-glow: #a37ecc;
    --border: #2a2a45;
    --danger: #c0392b;
    --link: #c084fc;
    --gold: #f0b27a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }
  /* Левая панель — список статей */
  .sidebar {
    width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 15px;
    gap: 15px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar h2 {
    font-size: 1.6rem;
    background: linear-gradient(135deg, var(--accent-glow), #e0b0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .search-box {
    width: 100%;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .sidebar .filters { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
  .badge {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.75rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
  }
  .badge.active { border-color: var(--accent); background: rgba(123,94,167,0.3); color: white; }
  .badge.epoch-badge { border-left: 4px solid var(--epoch-color, #888); }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    width: 100%;
    text-align: center;
    font-size: 0.85rem;
  }
  .btn:hover { background: var(--accent-glow); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { background: var(--surface2); }
  .btn-small { width: auto; padding: 4px 10px; font-size: 0.75rem; }

  .article-list {
    list-style: none;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .article-item {
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.1s;
    border-left: 3px solid transparent;
    font-size: 0.9rem;
    color: var(--text);
  }
  .article-item:hover { background: var(--surface2); }
  .article-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
    color: white;
    font-weight: 500;
  }
  .article-item .item-date {
    font-size: 0.7rem;
    color: var(--text-secondary);
    margin-right: 5px;
  }

  /* Основная область — статья */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 30px;
    overflow-y: auto;
    background: var(--bg);
  }
  .article-view {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 25px 30px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .article-view h1 {
    font-size: 2rem;
    margin-bottom: 5px;
    color: var(--accent-glow);
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }
  .article-meta {
    display: flex;
    gap: 10px;
    margin: 10px 0;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }
  .article-meta span {
    background: var(--surface2);
    padding: 2px 10px;
    border-radius: 12px;
  }
  .article-body {
    line-height: 1.7;
    margin-top: 20px;
    white-space: pre-wrap;
    font-size: 1rem;
  }
  .edit-btn {
    margin-top: 20px;
    width: auto;
  }
  .empty-message {
    text-align: center;
    color: var(--text-secondary);
    margin-top: 50px;
    font-size: 1.1rem;
  }

  /* Модальное окно редактирования */
  .modal-overlay {
    display: none;
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.7);
    justify-content: center; align-items: center; z-index:1000;
  }
  .modal {
    background: var(--surface);
    padding: 25px;
    border-radius: 16px;
    width: 90%;
    max-width: 800px;
    max-height: 90vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 15px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
  }
  .modal h2 { color: var(--accent-glow); }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  label { font-size: 0.8rem; color: var(--text-secondary); }
  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    font-family: inherit;
  }
  textarea { min-height: 250px; resize: vertical; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  .flex-buttons { display: flex; gap: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- Левая панель -->
<div class="sidebar">
  <h2>🌌 Архив Дьётонрея</h2>
  <input type="text" class="search-box" id="searchInput" placeholder="Поиск по статьям...">
  <div>
    <div style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:5px;">Эпохи:</div>
    <div class="filters" id="epochFilters"></div>
  </div>
  <div>
    <div style="font-size:0.8rem; color:var(--text-secondary); margin-bottom:5px;">Категории:</div>
    <div class="filters" id="categoryFilters"></div>
  </div>
  <button class="btn" id="addArticleBtn">➕ Новая статья</button>
  <div style="margin-top:10px;">
    <button class="btn btn-outline" id="exportBtn">📤 Экспорт</button>
    <button class="btn btn-outline" id="importBtn">📥 Импорт</button>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none">
  <div style="font-size:0.7rem; color:var(--text-secondary); margin-top:10px;">
    Кликните на статью слева, чтобы прочитать.
  </div>
  <ul class="article-list" id="articleList"></ul>
</div>

<!-- Основная область -->
<div class="main" id="mainContent">
  <div class="empty-message" id="noSelection">👈 Выберите статью из списка или создайте новую</div>
  <div class="article-view" id="articleView" style="display:none;"></div>
</div>

<!-- Модальное окно редактирования -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Редактирование статьи</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Дата / временная метка</label>
        <input type="text" id="editDate" placeholder="например, 4.03 млрд д.л.">
      </div>
      <div class="form-group">
        <label>Порядок сортировки</label>
        <input type="number" id="editOrder" value="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Эпоха</label>
        <select id="editEpoch"></select>
      </div>
      <div class="form-group">
        <label>Категория</label>
        <select id="editCategory"></select>
      </div>
    </div>
    <div class="form-group">
      <label>Название статьи</label>
      <input type="text" id="editTitle" placeholder="Заголовок">
    </div>
    <div class="form-group">
      <label>Текст статьи</label>
      <textarea id="editBody" placeholder="Подробное описание... Можно использовать пустые строки для абзацев."></textarea>
    </div>
    <div class="flex-buttons">
      <button class="btn btn-outline" id="cancelEditBtn">Отмена</button>
      <button class="btn" id="saveEditBtn">Сохранить</button>
    </div>
  </div>
</div>

<script>
  (() => {
    const STORAGE_KEY = 'dyotonrei_wiki';

    // Стартовые данные (демо)
    const defaultEpochs = [
      'Эон I: Рождение Огненного Шара',
      'Эон II: Континенты и Ванадиевая Жизнь',
      'Эон III: Звук и Кость',
      'Эон IV: Кхаары и Звёздные Сады'
    ];
    const defaultEpochColors = ['#d35400', '#2980b9', '#8e44ad', '#27ae60'];
    const defaultCategories = [
      'Космогония', 'Геология', 'Биология', 'Катаклизм', 'Эволюция',
      'Культура', 'Война', 'Технология', 'Современность'
    ];
    const defaultArticles = [
      { id:1, date:'6.87 млрд д.л.', order:1, epoch:defaultEpochs[0], category:'Космогония',
        title:'Рождение системы Кхарона',
        body:'Оранжевый карлик **Кхарон** (спектральный класс K4V, масса 0.75 M⊙, светимость 0.45 L⊙) собрал из протопланетного диска, богатого кристаллами силиката железа и вандата, шесть планет.\n\n**Дьётонрей** — вторая планета системы. Его скалистый мир начал формироваться 6.87 млрд д.л.\n\nПоверхность молодой планеты кипела реками расплавленной железисто-ванадиевой лавы под ядовитым оранжево-метановым небом. Кристаллы вандата и силиката железа придали будущей коре характерный оранжево-багряный оттенок.\n\nПараметры планеты:\n- Орбита: 1.21 а.е.\n- Год: 540 дней × 25 часов = 13 500 часов\n- Сутки: 25 часов\n- Гравитация: 0.85 g⊕\n- Радиус: 8600 км\n- Наклон оси: 24°' },
      { id:2, date:'4.03 млрд д.л.', order:2, epoch:defaultEpochs[1], category:'Биология',
        title:'Кислородная революция',
        body:'Цианобактерии освоили фотосинтез с ванадохлорофиллом → накопление O₂ → окрашивание океанов в ржавый цвет. Выжили организмы с ванадиевыми антиоксидантами.\n\nЭтот процесс радикально изменил атмосферу и подготовил почву для многоклеточной жизни.' },
      { id:3, date:'0.57 млрд д.л.', order:3, epoch:defaultEpochs[3], category:'Культура',
        title:'Пещерные царства барсов',
        body:'В ледниковых пещерах Ульдры барсы нашли спасение от кислотных туч. У разлома «Храмовых Пик» они обнаружили Вечные костры — подземные пожары, где плавились металлы. Это стало основой их культуры и технологии.\n\nРелигия: Огонь — лик богини Ары-Кузнечихи.\nТехнологии: выплавка олова, свинца, позже стали.\nОбщество: кланы объединились в «Союз Огня и Камня».' }
    ];

    let articles = [];
    let epochs = [];
    let epochColors = [];
    let categories = [];
    let activeId = null;

    // Загрузка
    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const d = JSON.parse(raw);
          articles = d.articles || [];
          epochs = d.epochs || [];
          epochColors = d.epochColors || [];
          categories = d.categories || [];
        } catch(e){}
      }
      if (!articles.length) {
        articles = defaultArticles.map(a => ({...a}));
        epochs = [...defaultEpochs];
        epochColors = [...defaultEpochColors];
        categories = [...defaultCategories];
        saveData();
      }
    }
    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({articles, epochs, epochColors, categories}));
    }

    // Фильтры (эпохи/категории)
    let activeEpoch = null, activeCategory = null, searchQuery = '';
    function renderFilters() {
      const epochDiv = document.getElementById('epochFilters');
      epochDiv.innerHTML = '';
      epochs.forEach((name,i) => {
        const span = document.createElement('span');
        span.className = `badge epoch-badge ${activeEpoch===name?'active':''}`;
        span.style.setProperty('--epoch-color', epochColors[i]||'#888');
        span.style.borderLeftColor = epochColors[i]||'#888';
        span.textContent = name;
        span.onclick = () => { activeEpoch = activeEpoch===name ? null : name; renderAll(); };
        epochDiv.appendChild(span);
      });
      const catDiv = document.getElementById('categoryFilters');
      catDiv.innerHTML = '';
      categories.forEach(cat => {
        const span = document.createElement('span');
        span.className = `badge ${activeCategory===cat?'active':''}`;
        span.textContent = cat;
        span.onclick = () => { activeCategory = activeCategory===cat ? null : cat; renderAll(); };
        catDiv.appendChild(span);
      });
    }

    function getFilteredArticles() {
      return articles.filter(a => {
        if (activeEpoch && a.epoch !== activeEpoch) return false;
        if (activeCategory && a.category !== activeCategory) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return (a.title.toLowerCase().includes(q) || a.body.toLowerCase().includes(q) ||
                  a.date.toLowerCase().includes(q) || a.epoch.toLowerCase().includes(q));
        }
        return true;
      }).sort((a,b) => a.order - b.order);
    }

    // Рендер списка статей слева
    function renderArticleList() {
      const list = document.getElementById('articleList');
      const filtered = getFilteredArticles();
      list.innerHTML = filtered.map(a => {
        const activeClass = (activeId === a.id) ? 'active' : '';
        return `<li class="article-item ${activeClass}" data-id="${a.id}">
          <span class="item-date">${escapeHtml(a.date)}</span>${escapeHtml(a.title)}
        </li>`;
      }).join('');
      // Обработчики клика
      list.querySelectorAll('.article-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = Number(item.dataset.id);
          setActiveArticle(id);
        });
      });
    }

    function renderArticleView() {
      const container = document.getElementById('articleView');
      const noSel = document.getElementById('noSelection');
      if (!activeId) {
        container.style.display = 'none';
        noSel.style.display = 'block';
        return;
      }
      const art = articles.find(a => a.id === activeId);
      if (!art) {
        container.style.display = 'none';
        noSel.style.display = 'block';
        return;
      }
      noSel.style.display = 'none';
      container.style.display = 'block';
      container.innerHTML = `
        <h1>${escapeHtml(art.title)}</h1>
        <div class="article-meta">
          <span style="background:${epochColors[epochs.indexOf(art.epoch)] || '#888'}">${escapeHtml(art.epoch)}</span>
          <span>${escapeHtml(art.category)}</span>
          <span>${escapeHtml(art.date)}</span>
        </div>
        <div class="article-body">${escapeHtml(art.body).replace(/\n/g, '<br>')}</div>
        <button class="btn edit-btn" id="editCurrentBtn">✏️ Редактировать</button>
        <button class="btn btn-outline edit-btn" id="deleteCurrentBtn" style="margin-left:10px;">🗑️ Удалить</button>
      `;
      document.getElementById('editCurrentBtn').addEventListener('click', () => openEditor(activeId));
      document.getElementById('deleteCurrentBtn').addEventListener('click', () => {
        if (confirm('Удалить эту статью?')) {
          articles = articles.filter(a => a.id !== activeId);
          activeId = null;
          saveData();
          renderAll();
        }
      });
    }

    function setActiveArticle(id) {
      activeId = id;
      renderArticleList();
      renderArticleView();
    }

    function renderAll() {
      renderFilters();
      renderArticleList();
      renderArticleView();
    }

    // Модальное окно редактирования
    const modal = document.getElementById('modalOverlay');
    function openEditor(id = null) {
      const titleEl = document.getElementById('modalTitle');
      const dateInp = document.getElementById('editDate');
      const orderInp = document.getElementById('editOrder');
      const epochSel = document.getElementById('editEpoch');
      const catSel = document.getElementById('editCategory');
      const titleInp = document.getElementById('editTitle');
      const bodyInp = document.getElementById('editBody');

      // Заполнить селекты
      epochSel.innerHTML = epochs.map(e => `<option value="${e}">${e}</option>`).join('');
      catSel.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');

      if (id) {
        const art = articles.find(a => a.id === id);
        if (!art) return;
        titleEl.textContent = 'Редактировать статью';
        dateInp.value = art.date;
        orderInp.value = art.order;
        epochSel.value = art.epoch;
        catSel.value = art.category;
        titleInp.value = art.title;
        bodyInp.value = art.body;
      } else {
        titleEl.textContent = 'Новая статья';
        dateInp.value = '';
        orderInp.value = articles.length ? Math.max(...articles.map(a=>a.order),0)+1 : 0;
        epochSel.value = epochs[0] || '';
        catSel.value = categories[0] || '';
        titleInp.value = '';
        bodyInp.value = '';
      }
      modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    document.getElementById('saveEditBtn').addEventListener('click', () => {
      const date = document.getElementById('editDate').value.trim();
      const order = parseInt(document.getElementById('editOrder').value) || 0;
      const epoch = document.getElementById('editEpoch').value;
      const cat = document.getElementById('editCategory').value;
      const title = document.getElementById('editTitle').value.trim();
      const body = document.getElementById('editBody').value.trim();
      if (!date || !title) { alert('Дата и название обязательны'); return; }

      const currentId = activeId; // ID статьи, которую редактируем (или null для новой)
      if (currentId) {
        const art = articles.find(a => a.id === currentId);
        if (art) {
          art.date = date; art.order = order; art.epoch = epoch;
          art.category = cat; art.title = title; art.body = body;
        }
      } else {
        const newArt = {
          id: Date.now(),
          date, order, epoch, category: cat, title, body
        };
        articles.push(newArt);
        activeId = newArt.id; // сразу открыть новую статью
      }
      saveData();
      closeModal();
      renderAll();
    });

    document.getElementById('addArticleBtn').addEventListener('click', () => openEditor(null));
    document.getElementById('cancelEditBtn').addEventListener('click', closeModal);
    window.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    // Поиск
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value;
      renderAll();
    });

    // Экспорт/импорт
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify({articles, epochs, epochColors, categories}, null, 2)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `dyotonrei_wiki_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
    document.getElementById('importFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.articles && data.epochs && data.categories) {
            if (confirm('Импорт заменит все данные. Продолжить?')) {
              articles = data.articles; epochs = data.epochs;
              epochColors = data.epochColors || []; categories = data.categories;
              activeId = null;
              saveData();
              renderAll();
            }
          } else alert('Неверный формат файла.');
        } catch(ex) { alert('Ошибка чтения JSON.'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    document.addEventListener('keydown', e => { if (e.key==='Escape' && modal.style.display==='flex') closeModal(); });

    // Утилита
    function escapeHtml(text) {
      return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }

    // Старт
    loadData();
    if (articles.length && !activeId) activeId = articles[0].id; // открыть первую статью
    renderAll();
  })();
</script>
</body>
</html>
